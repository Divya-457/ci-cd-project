<!DOCTYPE html>
<html>
<head>
    <title>CI/CD Demo</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            font-family: Arial;
        }

        .card {
            background: rgba(0,0,0,0.2);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            color: white;
            width: 350px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .message {
            display: none; /* hidden initially */
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: yellow; /* DIFFERENT COLOR */
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: white;
            font-weight: bold;
        }
    </style>

    <script>
        function showMessage() {
            document.getElementById("msg").style.display = "block";
        }
    </script>
</head>

<body>

    <div class="card">
        <h1>DevOps CI/CD Pipeline Demo</h1>

        <button onclick="showMessage()">Click Me</button>

        <p id="msg" class="message">
            Hi ! Welcome to Cloud Computing Laboratory.
        </p id="msg" class="message">
        <p>This app was deployed using CI/CD pipeline!</p>
    </div>

</body>
</html>
